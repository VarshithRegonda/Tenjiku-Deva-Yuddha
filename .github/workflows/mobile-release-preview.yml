name: Mobile Release Preview

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Tenjiku-Universal-App/**"

jobs:
  expo-export-preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Tenjiku-Universal-App
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Tenjiku-Universal-App/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export web preview bundle
        run: npx expo export --platform web
